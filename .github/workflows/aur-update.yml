name: Update AUR package

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  aur-sync:
    name: Sync PKGBUILD with upstream release
    runs-on: ubuntu-latest
    env:
      AUR_REPO: ssh://aur@aur.archlinux.org/skills-manager.git
      UPSTREAM_REPO: xingkongliang/skills-manager

    steps:
      - name: Load AUR SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Trust AUR host key
        run: ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Test AUR SSH connection
        run: ssh -T -o BatchMode=yes aur@aur.archlinux.org

      - name: Determine latest upstream version
        id: upstream
        run: |
          set -euo pipefail
          tag=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" | jq -r '.tag_name')
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "::error::Could not resolve latest upstream release tag."
            exit 1
          fi
          pkgver="${tag#v}"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: v${pkgver}"

      - name: Clone AUR repository
        run: git clone "$AUR_REPO" aur

      - name: Check if update is needed
        id: check
        working-directory: aur
        env:
          PKGVER: ${{ steps.upstream.outputs.pkgver }}
        run: |
          set -euo pipefail
          current=$(grep -E '^pkgver=' PKGBUILD | cut -d= -f2)
          if [[ "$current" == "$PKGVER" ]]; then
            echo "Already up to date (${current})."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: ${current} -> ${PKGVER}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.skip != 'true'
        working-directory: aur
        env:
          PKGVER: ${{ steps.upstream.outputs.pkgver }}
        run: |
          set -euo pipefail
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD

      - name: Refresh checksums and metadata
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}/aur:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -euo pipefail -c '
              pacman -Syu --noconfirm pacman-contrib
              useradd -m builduser
              chown -R builduser:builduser /pkg
              su builduser -c "cd /pkg && updpkgsums && makepkg --printsrcinfo > .SRCINFO"
            '

      - name: Commit and push changes
        if: steps.check.outputs.skip != 'true'
        working-directory: aur
        env:
          PKGVER: ${{ steps.upstream.outputs.pkgver }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PKGBUILD .SRCINFO
          git commit -m "chore(aur): bump to ${PKGVER}"
          git push origin HEAD
